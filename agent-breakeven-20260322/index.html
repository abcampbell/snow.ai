<script type="text/babel" data-type="module">
const { useState, useMemo, useCallback } = React;

const WORK_HOURS_PER_DAY = 8;
const WORK_DAYS_PER_MONTH = 22;

function compute(params) {
  const {
    hourlyValue,
    agentCostMonthly,
    analystCostMonthly,
    checkInsPerHour,
    minutesPerCheckIn,
    errorsPerDay,
    minutesPerError,
    numAgents,
    coordMinutesPerPair,
    analystCheckInsPerDay,
    analystMinutesPerCheckIn,
    analystErrorsPerDay,
    analystMinutesPerError,
    deepWorkPenalty,
  } = params;

  const V = hourlyValue;
  const days = WORK_DAYS_PER_MONTH;
  const hours = WORK_HOURS_PER_DAY;
  const N = numAgents;

  const agentCheckInHoursPerDay = checkInsPerHour * hours * (minutesPerCheckIn / 60);
  const agentErrorHoursPerDay = errorsPerDay * (minutesPerError / 60);
  const singleAgentDailyHours = agentCheckInHoursPerDay + agentErrorHoursPerDay;

  const remainingHours = Math.max(0, hours - singleAgentDailyHours * N);
  const deepWorkLostHours = remainingHours * (deepWorkPenalty / 100) * N;

  const pairs = (N * (N - 1)) / 2;
  const coordHoursPerDay = pairs * (coordMinutesPerPair / 60);

  const totalSupervisorHoursPerDay =
    N * singleAgentDailyHours + coordHoursPerDay + deepWorkLostHours;

  const agentSticker = N * agentCostMonthly;
  const supervisorCost = V * totalSupervisorHoursPerDay * days;
  const loadedAgentCost = agentSticker + supervisorCost;

  const analystCheckInHoursPerDay =
    analystCheckInsPerDay * (analystMinutesPerCheckIn / 60);
  const analystErrorHoursPerDay =
    analystErrorsPerDay * (analystMinutesPerError / 60);
  const analystSupervisorHoursPerDay =
    analystCheckInHoursPerDay + analystErrorHoursPerDay;
  const analystSupervisorCost = V * analystSupervisorHoursPerDay * days;
  const loadedAnalystCost = analystCostMonthly + analystSupervisorCost;

  const yourHoursConsumedByAgents = Math.min(totalSupervisorHoursPerDay, hours);
  const yourPctConsumed = (yourHoursConsumedByAgents / hours) * 100;

  const agentTimePerMonth = totalSupervisorHoursPerDay * days;
  const analystTimePerMonth = analystSupervisorHoursPerDay * days;
  const timeDelta = agentTimePerMonth - analystTimePerMonth;
  const costDelta = analystCostMonthly - agentSticker;
  const breakEvenV = timeDelta > 0 ? costDelta / timeDelta : Infinity;

  return {
    loadedAgentCost,
    loadedAnalystCost,
    agentSticker,
    supervisorCost,
    analystSupervisorCost,
    totalSupervisorHoursPerDay,
    yourPctConsumed,
    yourHoursRemaining: hours - yourHoursConsumedByAgents,
    coordHoursPerDay,
    deepWorkLostHours,
    breakEvenV: breakEvenV > 0 ? breakEvenV : null,
    pairs,
    agentWins: loadedAgentCost < loadedAnalystCost,
    singleAgentDailyHours,
  };
}

function generateHeatmap(params) {
  const agentCounts = [1, 2, 3, 4, 5, 6];
  const hourlyRates = [50, 100, 150, 200, 250, 300, 400, 500];
  const grid = [];
  for (const rate of hourlyRates) {
    const row = [];
    for (const n of agentCounts) {
      const r = compute({ ...params, hourlyValue: rate, numAgents: n });
      row.push({
        agentWins: r.agentWins,
        ratio: r.loadedAgentCost / r.loadedAnalystCost,
        loadedAgent: r.loadedAgentCost,
        loadedAnalyst: r.loadedAnalystCost,
        pctConsumed: r.yourPctConsumed,
      });
    }
    grid.push(row);
  }
  return { agentCounts, hourlyRates, grid };
}

const fmt = (n) =>
  n >= 1000
    ? "$" + (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "K"
    : "$" + Math.round(n);

const fmtFull = (n) => "$" + Math.round(n).toLocaleString();

function Slider({ label, value, onChange, min, max, step, unit, note, alt }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          marginBottom: 4,
        }}
      >
        <span style={{ color: "#8a8f98", fontSize: 12, fontFamily: "'DM Mono', monospace", letterSpacing: "0.03em" }}>
          {label}
        </span>
        <span
          style={{
            color: "#e8eaed",
            fontSize: 13,
            fontFamily: "'DM Mono', monospace",
            fontWeight: 500,
          }}
        >
          {unit === "$" ? "$" : ""}
          {value}
          {unit === "$" ? "" : unit || ""}
          {alt && <span style={{ color: "#5a5e66", fontWeight: 400, fontSize: 11 }}>{" "}({alt})</span>}
        </span>
      </div>
      <input
        type="range"
        min={min}
        max={max}
        step={step}
        value={value}
        onChange={(e) => onChange(Number(e.target.value))}
        style={{ width: "100%", accentColor: "#c9a44a" }}
      />
      {note && (
        <div style={{ color: "#5a5e66", fontSize: 10, marginTop: 2, fontFamily: "'DM Mono', monospace" }}>
          {note}
        </div>
      )}
    </div>
  );
}

function StatBox({ label, value, sub, color, warn }) {

      style={{
        background: warn ? "rgba(201, 60, 55, 0.08)" : "rgba(255,255,255,0.02)",

          color: "#6b7078",

          marginBottom: 6,
          fontFamily: "'DM Mono', monospace",
        }}
      >
        {label}
      </div>
      <div
        style={{
          fontSize: 22,
          fontWeight: 600,
          color: color || "#e8eaed",
          fontFamily: "'DM Mono', monospace",
          letterSpacing: "-0.02em",
        }}

        {value}
      </div>
      {sub && (
        <div style={{ fontSize: 10, color: "#5a5e66", marginTop: 4, fontFamily: "'DM Mono', monospace" }}>
          {sub}
        </div>
      )}
    </div>
  );
}

function AgentCalculator() {
  const [hourlyValue, setHourlyValue] = useState(300);
  const [agentCostMonthly, setAgentCostMonthly] = useState(200);
  const [analystCostMonthly, setAnalystCostMonthly] = useState(10000);
  const [checkInsPerHour, setCheckInsPerHour] = useState(6);
  const [minutesPerCheckIn, setMinutesPerCheckIn] = useState(3);
  const [errorsPerDay, setErrorsPerDay] = useState(4);
  const [minutesPerError, setMinutesPerError] = useState(15);
  const [numAgents, setNumAgents] = useState(3);
  const [coordMinutesPerPair, setCoordMinutesPerPair] = useState(20);
  const [analystCheckInsPerDay, setAnalystCheckInsPerDay] = useState(3);
  const [analystMinutesPerCheckIn, setAnalystMinutesPerCheckIn] = useState(10);
  const [analystErrorsPerDay, setAnalystErrorsPerDay] = useState(1);
  const [analystMinutesPerError, setAnalystMinutesPerError] = useState(15);
  const [deepWorkPenalty, setDeepWorkPenalty] = useState(15);
  const [showAdvanced, setShowAdvanced] = useState(false);

  const params = {
    hourlyValue, agentCostMonthly, analystCostMonthly, checkInsPerHour,
    minutesPerCheckIn, errorsPerDay, minutesPerError, numAgents,
    coordMinutesPerPair, analystCheckInsPerDay, analystMinutesPerCheckIn,
    analystErrorsPerDay, analystMinutesPerError, deepWorkPenalty,
  };

  const r = useMemo(() => compute(params), [
    hourlyValue, agentCostMonthly, analystCostMonthly, checkInsPerHour,
    minutesPerCheckIn, errorsPerDay, minutesPerError, numAgents,
    coordMinutesPerPair, analystCheckInsPerDay, analystMinutesPerCheckIn,
    analystErrorsPerDay, analystMinutesPerError, deepWorkPenalty,
  ]);

  const heatmap = useMemo(() => generateHeatmap(params), [
    agentCostMonthly, analystCostMonthly, checkInsPerHour, minutesPerCheckIn,
    errorsPerDay, minutesPerError, coordMinutesPerPair, analystCheckInsPerDay,
    analystMinutesPerCheckIn, analystErrorsPerDay, analystMinutesPerError,
    deepWorkPenalty,
  ]);

  // Fixed scale so the agent bar visually GROWS when you crank check-ins
  // instead of the analyst bar shrinking (which is confusing)
  const barMax = Math.max(r.loadedAgentCost, r.loadedAnalystCost, analystCostMonthly * 3);

  const getCellColor = (cell) => {
    if (cell.pctConsumed > 100) return { bg: "#1a1012", text: "#c93c37", border: "rgba(201,60,55,0.3)" };
    if (cell.ratio < 0.5) return { bg: "rgba(58, 142, 84, 0.15)", text: "#4eba6f", border: "rgba(58,142,84,0.2)" };
    if (cell.ratio < 0.8) return { bg: "rgba(58, 142, 84, 0.08)", text: "#3a8e54", border: "rgba(58,142,84,0.1)" };
    if (cell.ratio < 1.0) return { bg: "rgba(201, 164, 74, 0.08)", text: "#c9a44a", border: "rgba(201,164,74,0.15)" };
    if (cell.ratio < 1.5) return { bg: "rgba(201, 100, 55, 0.08)", text: "#c96a37", border: "rgba(201,100,55,0.15)" };
    return { bg: "rgba(201, 60, 55, 0.1)", text: "#c93c37", border: "rgba(201,60,55,0.2)" };
  };

  return (
    <div
      style={{
        background: "#0d0e11",
        color: "#e8eaed",
        minHeight: "100vh",
        padding: "32px 20px",
        fontFamily: "'DM Sans', system-ui, sans-serif",
      }}
    >
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />

      <div style={{ maxWidth: 1100, margin: "0 auto" }}>
        <div
          style={{
            fontSize: 10,
            color: "#c9a44a",
            textTransform: "uppercase",
            letterSpacing: "0.15em",
            marginBottom: 8,
            fontFamily: "'DM Mono', monospace",
          }}
        >
          The Campbell Ramble
        </div>

          style={{
            fontSize: 28,
            fontWeight: 700,
            color: "#e8eaed",
            margin: "0 0 6px 0",
            lineHeight: 1.15,
            letterSpacing: "-0.02em",
          }}
        >
          The Loaded Cost of AI Agents
        </h1>
        <p
          style={{
            fontSize: 14,
            color: "#6b7078",
            margin: "0 0 32px 0",
            lineHeight: 1.6,
            maxWidth: 560,
          }}

          An agent costs $200/month. But you're checking in 6x an hour.{" "}

        <div style={{ marginBottom: 20, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, padding: "16px 20px 4px" }}>

        </div>

        {(() => {

          const humanIndirect = r.analystSupervisorCost * 12;
          const humanTotal = humanDirect + humanIndirect;
          const agentDirect = r.agentSticker * 12;
          const agentIndirect = r.supervisorCost * 12;
          const agentTotal = agentDirect + agentIndirect;
          const colMax = Math.max(humanTotal, agentTotal);
          const chartHeight = 320;

          const humanDirectPct = (humanDirect / colMax) * 100;
          const humanIndirectPct = (humanIndirect / colMax) * 100;
          const agentDirectPct = (agentDirect / colMax) * 100;
          const agentIndirectPct = (agentIndirect / colMax) * 100;

          const humanColor = !r.agentWins ? "#3a8e54" : "#c9a44a";
          const humanColorLight = !r.agentWins ? "rgba(58, 142, 84, 0.25)" : "rgba(201, 164, 74, 0.2)";
          const agentColor = r.agentWins ? "#3a8e54" : "#c93c37";
          const agentColorLight = r.agentWins ? "rgba(58, 142, 84, 0.25)" : "rgba(201, 60, 55, 0.2)";

          return (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 280px 1fr", gap: 16, marginBottom: 28, alignItems: "start" }}>

              {/* LEFT: Human Analyst sliders */}
              <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, padding: "20px 20px 8px" }}>
                <div style={{ fontSize: 10, color: "#c9a44a", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 16, fontFamily: "'DM Mono', monospace" }}>
                  Human Analyst
                </div>
                <Slider label="Monthly cost" value={analystCostMonthly} onChange={setAnalystCostMonthly} min={3000} max={25000} step={500} unit="$" alt={`$${Math.round(analystCostMonthly * 12 / 1000)}K/yr`} note="Fully loaded (salary + benefits + seat)" />
                <Slider label="Check-ins per day" value={analystCheckInsPerDay} onChange={setAnalystCheckInsPerDay} min={1} max={8} step={1} />
                <Slider label="Minutes per check-in" value={analystMinutesPerCheckIn} onChange={setAnalystMinutesPerCheckIn} min={5} max={30} step={5} unit=" min" />
                <Slider label="Errors per day" value={analystErrorsPerDay} onChange={setAnalystErrorsPerDay} min={0} max={5} step={1} />
                <Slider label="Minutes per error fix" value={analystMinutesPerError} onChange={setAnalystMinutesPerError} min={5} max={60} step={5} unit=" min" />
              </div>

              {/* CENTER: Stacked column chart */}
              <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, padding: "20px 16px" }}>
                <div style={{ fontSize: 10, color: "#c9a44a", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 16, fontFamily: "'DM Mono', monospace", textAlign: "center" }}>
                  Annual Loaded Cost
                </div>

                {/* Verdict line */}
                <div style={{
                  fontSize: 11, fontWeight: 600, textAlign: "center", marginBottom: 16,
                  color: r.agentWins ? "#4eba6f" : "#c93c37", fontFamily: "'DM Mono', monospace",
                }}>
                  {r.agentWins ? "Agents win" : "Hire the human"}
                </div>

                {/* Columns */}
                <div style={{ display: "flex", gap: 20, justifyContent: "center", alignItems: "flex-end", height: chartHeight, marginBottom: 8 }}>

                  {/* Human column */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 90 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: "#e8eaed", fontFamily: "'DM Mono', monospace", marginBottom: 6 }}>
                      ${Math.round(humanTotal / 1000)}K
                    </div>
                    <div style={{ width: "100%", display: "flex", flexDirection: "column", justifyContent: "flex-end", height: chartHeight - 30 }}>
                      {/* Indirect (lighter, on top) */}
                      <div style={{
                        width: "100%",
                        height: `${humanIndirectPct}%`,
                        background: humanColorLight,
                        borderRadius: "4px 4px 0 0",
                        transition: "height 0.3s ease",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        minHeight: humanIndirectPct > 3 ? 20 : 0,
                      }}>
                        {humanIndirectPct > 8 && (
                          <span style={{ fontSize: 9, color: "#8a8f98", fontFamily: "'DM Mono', monospace" }}>
                            ${Math.round(humanIndirect / 1000)}K
                          </span>
                        )}
                      </div>
                      {/* Direct (darker, on bottom) */}
                      <div style={{
                        width: "100%",
                        height: `${humanDirectPct}%`,
                        background: humanColor,
                        borderRadius: humanIndirectPct > 0 ? "0 0 4px 4px" : 4,
                        transition: "height 0.3s ease",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        minHeight: 20,
                      }}>
                        <span style={{ fontSize: 9, color: "#e8eaed", fontFamily: "'DM Mono', monospace", fontWeight: 500 }}>
                          ${Math.round(humanDirect / 1000)}K
                        </span>
                      </div>
                    </div>
                    <div style={{ fontSize: 10, color: "#8a8f98", fontFamily: "'DM Mono', monospace", marginTop: 8 }}>Human</div>
                  </div>

                  {/* Agent column */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 90 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: "#e8eaed", fontFamily: "'DM Mono', monospace", marginBottom: 6 }}>
                      ${Math.round(agentTotal / 1000)}K
                    </div>
                    <div style={{ width: "100%", display: "flex", flexDirection: "column", justifyContent: "flex-end", height: chartHeight - 30 }}>
                      {/* Indirect (lighter, on top) */}
                      <div style={{
                        width: "100%",
                        height: `${agentIndirectPct}%`,
                        background: agentColorLight,
                        borderRadius: "4px 4px 0 0",
                        transition: "height 0.3s ease",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        minHeight: agentIndirectPct > 3 ? 20 : 0,
                      }}>
                        {agentIndirectPct > 8 && (
                          <span style={{ fontSize: 9, color: "#8a8f98", fontFamily: "'DM Mono', monospace" }}>
                            ${Math.round(agentIndirect / 1000)}K
                          </span>
                        )}
                      </div>
                      {/* Direct (darker, on bottom) */}
                      <div style={{
                        width: "100%",
                        height: `${Math.max(agentDirectPct, 1)}%`,
                        background: agentColor,
                        borderRadius: agentIndirectPct > 0 ? "0 0 4px 4px" : 4,
                        transition: "height 0.3s ease",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        minHeight: 20,
                      }}>
                        <span style={{ fontSize: 9, color: "#e8eaed", fontFamily: "'DM Mono', monospace", fontWeight: 500 }}>
                          ${(agentDirect / 1000).toFixed(1)}K
                        </span>
                      </div>
                    </div>
                    <div style={{ fontSize: 10, color: "#8a8f98", fontFamily: "'DM Mono', monospace", marginTop: 8 }}>
                      Agent{numAgents > 1 ? `s(${numAgents})` : ""}
                    </div>
                  </div>

                </div>

                <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 12, borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 10 }}>

                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <div style={{ width: 10, height: 10, background: "rgba(255,255,255,0.12)", borderRadius: 2 }} />
                    <span style={{ fontSize: 9, color: "#6b7078", fontFamily: "'DM Mono', monospace" }}>Your time</span>
                  </div>
                </div>

                {r.yourPctConsumed > 50 && (
                  <div style={{ fontSize: 9, color: r.yourPctConsumed > 80 ? "#c93c37" : "#c9a44a", marginTop: 8, fontFamily: "'DM Mono', monospace", textAlign: "center" }}>
                    {r.totalSupervisorHoursPerDay.toFixed(1)}h/day consumed ({Math.min(r.yourPctConsumed, 999).toFixed(0)}%)
                  </div>
                )}
              </div>

              {/* RIGHT: AI Agent sliders */}
              <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, padding: "20px 20px 8px" }}>
                <div style={{ fontSize: 10, color: "#c9a44a", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 16, fontFamily: "'DM Mono', monospace" }}>
                  AI Agents
                </div>
                <Slider label="Cost per agent / mo" value={agentCostMonthly} onChange={setAgentCostMonthly} min={20} max={1000} step={20} unit="$" alt={`$${(agentCostMonthly * 12 / 1000).toFixed(1)}K/yr`} />
                <Slider label="Number of agents" value={numAgents} onChange={setNumAgents} min={1} max={8} step={1} alt={`$${(agentCostMonthly * numAgents * 12 / 1000).toFixed(1)}K/yr sticker`} />
                <Slider label="Check-ins per hour" value={checkInsPerHour} onChange={setCheckInsPerHour} min={1} max={12} step={1} note={`Every ${Math.round(60 / checkInsPerHour)} min you context-switch`} />
                <Slider label="Min per check-in" value={minutesPerCheckIn} onChange={setMinutesPerCheckIn} min={1} max={15} step={1} unit=" min" alt={`${(checkInsPerHour * minutesPerCheckIn).toFixed(0)} min/hr`} />
                <Slider label="Errors per agent / day" value={errorsPerDay} onChange={setErrorsPerDay} min={0} max={12} step={1} />
                <Slider label="Min per error fix" value={minutesPerError} onChange={setMinutesPerError} min={5} max={60} step={5} unit=" min" />
                <Slider label="Coord per pair / day" value={coordMinutesPerPair} onChange={setCoordMinutesPerPair} min={0} max={60} step={5} unit=" min" note={`${r.pairs} pairs through you`} />
                <Slider label="Context-switch penalty" value={deepWorkPenalty} onChange={setDeepWorkPenalty} min={0} max={40} step={5} unit="%" note="% remaining hours lost" />
              </div>

            </div>
          );
        })()}

        {/* Heatmap */}
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontSize: 10, color: "#6b7078", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6, fontFamily: "'DM Mono', monospace" }}>
            Break-Even Surface
          </div>
          <div style={{ fontSize: 11, color: "#5a5e66", marginBottom: 12, fontFamily: "'DM Mono', monospace" }}>
            Your hourly rate vs. agent count. Green = agents win. Red = hire the human.
          </div>
          <div style={{ overflowX: "auto" }}>
            <table
              style={{
                borderCollapse: "collapse",
                width: "100%",
                fontFamily: "'DM Mono', monospace",
                fontSize: 11,
              }}
            >
              <thead>
                <tr>
                  <th style={{ padding: "8px 10px", textAlign: "left", color: "#5a5e66", fontSize: 9, fontWeight: 400, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                    $/hr
                  </th>
                  {heatmap.agentCounts.map((n) => (
                    <th key={n} style={{ padding: "8px 10px", textAlign: "center", color: "#5a5e66", fontSize: 9, fontWeight: 400, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                      {n} agent{n > 1 ? "s" : ""}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {heatmap.hourlyRates.map((rate, ri) => (
                  <tr key={rate}>
                    <td
                      style={{
                        padding: "6px 10px",
                        color: "#8a8f98",
                        borderBottom: "1px solid rgba(255,255,255,0.03)",
                        fontWeight: rate === hourlyValue ? 600 : 400,
                        background: rate === hourlyValue ? "rgba(201, 164, 74, 0.06)" : "transparent",
                      }}
                    >
                      ${rate}
                    </td>
                    {heatmap.grid[ri].map((cell, ci) => {
                      const c = getCellColor(cell);
                      const isCurrentCell = rate === hourlyValue && heatmap.agentCounts[ci] === numAgents;
                      return (
                        <td
                          key={ci}
                          style={{
                            padding: "6px 10px",
                            textAlign: "center",
                            color: c.text,
                            background: isCurrentCell ? "rgba(201, 164, 74, 0.12)" : c.bg,
                            borderBottom: "1px solid rgba(255,255,255,0.03)",
                            border: isCurrentCell ? "1px solid rgba(201, 164, 74, 0.4)" : undefined,
                            fontWeight: isCurrentCell ? 600 : 400,
                          }}
                        >
                          {cell.pctConsumed > 100 ? "\u221E" : fmt(cell.loadedAgent)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {r.breakEvenV && r.breakEvenV > 0 && r.breakEvenV < 1000 && (
            <div style={{ fontSize: 11, color: "#8a8f98", marginTop: 10, fontFamily: "'DM Mono', monospace" }}>
              At {numAgents} agent{numAgents > 1 ? "s" : ""}, break-even is ${Math.round(r.breakEvenV)}/hr.{" "}
              Above that, the analyst wins.
            </div>
          )}
        </div>

        {/* The Math */}
        <div
          style={{
            background: "rgba(255,255,255,0.02)",
            border: "1px solid rgba(255,255,255,0.06)",
            borderRadius: 8,
            padding: "16px 20px",
            marginBottom: 32,
          }}
        >
          <div style={{ fontSize: 10, color: "#6b7078", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12, fontFamily: "'DM Mono', monospace" }}>
            The Math
          </div>
          <div style={{ fontSize: 12, color: "#8a8f98", lineHeight: 1.8, fontFamily: "'DM Mono', monospace" }}>
            <div style={{ color: "#5a5e66", marginBottom: 4 }}>// Single agent daily overhead</div>
            <div>check_ins = {checkInsPerHour}/hr × {WORK_HOURS_PER_DAY}h × {minutesPerCheckIn}min = <span style={{ color: "#e8eaed" }}>{(checkInsPerHour * WORK_HOURS_PER_DAY * minutesPerCheckIn / 60).toFixed(1)}h</span></div>
            <div>errors = {errorsPerDay} × {minutesPerError}min = <span style={{ color: "#e8eaed" }}>{(errorsPerDay * minutesPerError / 60).toFixed(1)}h</span></div>
            <div>single_agent = <span style={{ color: "#e8eaed" }}>{r.singleAgentDailyHours.toFixed(1)}h/day</span></div>
            <div style={{ color: "#5a5e66", marginTop: 8, marginBottom: 4 }}>// Multi-agent scaling</div>
            <div>N = {numAgents}, pairs = N(N-1)/2 = <span style={{ color: "#e8eaed" }}>{r.pairs}</span></div>
            <div>coordination = {r.pairs} × {coordMinutesPerPair}min = <span style={{ color: "#e8eaed" }}>{r.coordHoursPerDay.toFixed(1)}h/day</span></div>
            <div>fragmentation = <span style={{ color: "#e8eaed" }}>{r.deepWorkLostHours.toFixed(1)}h/day</span></div>
            <div style={{ color: "#5a5e66", marginTop: 8, marginBottom: 4 }}>// Loaded cost</div>
            <div>your_time = {r.totalSupervisorHoursPerDay.toFixed(1)}h/day × ${hourlyValue}/hr × {WORK_DAYS_PER_MONTH}d = <span style={{ color: "#c9a44a" }}>{fmtFull(r.supervisorCost)}</span></div>
            <div>sticker = {numAgents} × ${agentCostMonthly} = <span style={{ color: "#e8eaed" }}>{fmtFull(r.agentSticker)}</span></div>
            <div style={{ color: "#e8eaed", marginTop: 4, fontSize: 13 }}>loaded_agent_cost = <span style={{ color: r.agentWins ? "#4eba6f" : "#c93c37" }}>{fmtFull(r.loadedAgentCost)}/mo</span></div>
          </div>
        </div>

        {/* Footer */}
        <div
          style={{
            fontSize: 10,
            color: "#3a3d44",
            textAlign: "center",
            fontFamily: "'DM Mono', monospace",
            paddingBottom: 20,
          }}
        >
          The Campbell Ramble — thecampbellramble.com
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AgentCalculator />);
</script>
</body>
</html>
