  th{text-align:left;padding:8px;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase}
  td{padding:6px 8px;border-bottom:1px solid #1c2128}

  .corner-mark{position:fixed;bottom:1rem;right:1.5rem;font-size:10px;color:var(--text-dim);z-index:10}
  .corner-mark a{color:var(--text-dim);text-decoration:none}
